/* Background */
.tgme_background_wrap {

}

/* Header */
.tgme_head_wrap {

    z-index: 1;
}

.tgme_head {

}

}

/* Button */
a.tgme_head_right_btn {

    background: #2481cc;

    border-radius: 17px;

}

/* Body */
.tgme_body_wrap {
    padding: 100px 20px 60px; /* spacing বড় */
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== CARD (BIGGER) ===== */
.tgme_page {
    position: relative;
    margin: 0 auto;
    padding: 40px 30px; /* ভিতরের space বড় */
    max-width: 520px; /* আগে 400px ছিল */
    width: 100%;
    background: #fff;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    border-radius: 18px;
}

/* Image */
.tgme_page_photo {
    text-align: center;
    padding-bottom: 18px;
}

.tgme_page_photo_image {
    width: 130px;
    height: 130px;
    border-radius: 65px;
    border: 3px solid #2481cc;
}

/* Title */
.tgme_page_title {
    font-size: 26px; /* বড় */
    line-height: 32px;
    font-weight: bold;
    text-align: center;
}

/* Subscribers */
.tgme_page_extra {
    font-size: 16px;
    text-align: center;
    color: #666;
    margin-top: 5px;
}

/* Button */
.tgme_page_action {
    text-align: center;
    margin-top: 28px;
}

a.tgme_action_button_new {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    background: #2481cc;
    border-radius: 25px;
    padding: 16px 36px;
    display: inline-block;
    box-shadow: 0 6px 16px rgba(36, 129, 204, 0.3);
}

/* Footer */
.tgme_page_additional {
    font-size: 15px;
    text-align: center;
    margin-top: 28px;
    padding-top: 16px;
    color: #666;
    border-top: 1px solid #eee;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    .tgme_page {
        max-width: 95%;
        padding: 30px 20px;
    }

    .tgme_page_photo_image {
        width: 100px;
        height: 100px;
    }

    .tgme_page_title {
        font-size: 20px;
    }

    a.tgme_action_button_new {
        width: 100%;
        max-width: 280px;
    }
}

@media (max-width: 400px) {

    .tgme_page_photo_image {
        width: 90px;
        height: 90px;
    }

    .tgme_page_title {
        font-size: 18px;
    }
}
</style>
