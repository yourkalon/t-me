<!doctype html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>দেশি কালেকশন - Telegram</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f0f2f5;
}

/* Header */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#fff;
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    z-index:10;
}

.header img{
    height:35px;
}

.btn{
    background:#2481cc;
    color:#fff;
    padding:8px 15px;
    border-radius:20px;
    font-size:14px;
}

/* Main Card */
.container{
    padding-top:80px;
    display:flex;
    justify-content:center;
}

.card{
    background:#fff;
    width:95%;
    max-width:380px;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Image */
.card img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #2481cc;
}

/* Text */
.title{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

.sub{
    color:#666;
    font-size:14px;
    margin-top:5px;
}

.desc{
    margin-top:10px;
    font-size:15px;
}

/* Action Button */
.action{
    margin-top:20px;
}

.action a{
    display:block;
    background:#2481cc;
    color:#fff;
    padding:12px;
    border-radius:25px;
    font-weight:bold;
}

/* Mobile Fix */
@media(max-width:400px){
    .title{font-size:18px;}
    .desc{font-size:14px;}
}
</style>
</head>

<body>

<div class="header">
    <img src="https://telegram.org/img/website_icon.svg">
    <div class="btn" onclick="go()">Download</div>
</div>

<div class="container">
    <div class="card">

        <img src="https://via.placeholder.com/120" alt="profile">

        <div class="title">বাংলাদেশী হট কালেকশন</div>
        <div class="sub">31,811 subscribers</div>

        <div class="desc">
            Telegram থাকলে এখনই গ্রুপে যোগ দিন
        </div>

        <div class="action">
            <a href="#" onclick="go()">View in Telegram</a>
        </div>

    </div>
</div>

<script>
function go(){
    window.location.href="YOUR_LINK_HERE";
}
</script>

</body>
</html>
